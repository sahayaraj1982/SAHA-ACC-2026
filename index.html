<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026 | LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a202c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2d3748; padding: 40px; border-radius: 20px; border: 5px solid #facc15; text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; color: black; font-weight: bold; text-align: center; }
        button { width: 100%; padding: 12px; background: #f63; border-radius: 8px; font-weight: bold; cursor: pointer; border-bottom: 4px solid #b32d00; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="text-yellow-400 text-2xl font-black mb-4 italic">SAHAYARAJ-2026</h2>
        <input type="text" id="user" placeholder="USERNAME">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="checkLogin()">LOGIN NOW ✅</button>
    </div>

    <script>
        // இங்கே உங்கள் புதிய URL-ஐ மட்டும் சரியாகப் போடவும்
        const SCRIPT_URL = https://script.google.com/macros/s/AKfycbxLkJlmcJhBW3BUtYCe7ueoNnEmCX1WGIXvxEvBvXcFgkh455h6Aoq97wy7JAyWUJrL/exec";

        function checkLogin() {
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();
            if(!u || !p) { alert("விவரங்களை உள்ளிடவும்!"); return; }

            fetch(`${SCRIPT_URL}?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
            .then(res => res.text())
            .then(data => {
                const result = data.trim();
                if(result === "success") {
                    sessionStorage.setItem("isAuth", "true");
                    window.location.href = "app.html";
                } else if(result === "expired") {
                    alert("❌ காலம் முடிந்துவிட்டது!");
                } else {
                    alert("❌ தவறான விவரங்கள்!");
                }
            })
            .catch(err => alert("சர்வர் பிழை! மீண்டும் முயற்சிக்கவும்."));
        }
    </script>
</body>
</html>
