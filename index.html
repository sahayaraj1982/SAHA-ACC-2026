<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
.box{
 width:350px;
 background:#1e293b;
 padding:30px;
 border-radius:20px;
 box-shadow:0 0 20px gold;
}
h2{
 color:gold;
 text-align:center;
}
input{
 width:100%;
 padding:12px;
 margin:10px 0;
 border:none;
 border-radius:8px;
 box-sizing:border-box;
}
button{
 width:100%;
 padding:12px;
 background:#22c55e;
 color:white;
 border:none;
 border-radius:8px;
}
#msg{
 text-align:center;
 color:red;
 margin-top:10px;
}
</style>
</head>
<body>
<div class="box">
<h2>USER LOGIN</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div id="msg"></div>
</div>

<script>
const DB_URL = "YOUR_FIREBASE_URL/users.json";

function login(){
 let user=document.getElementById("username").value;
 let pass=document.getElementById("password").value;

 fetch(DB_URL)
 .then(res=>res.json())
 .then(data=>{
   let ok=false;
   for(let key in data){
     if(data[key].username===user && data[key].password===pass){
       ok=true;
     }
   }

   if(ok){
     window.location.href="admin.html";
   }else{
     document.getElementById("msg").innerText="Login Failed";
   }
 });
}
</script>
</body>
</html>
