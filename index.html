<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026 | LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            border: 3px solid #fbbf24; /* கோல்டன் கலர் அவுட்லைன் */
            box-shadow: 0 0 20px #fbbf24; 
            text-align: center; 
            width: 350px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            color: black; 
            font-weight: bold; 
            text-align: center;
            border: 2px solid #fbbf24;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #fbbf24; 
            color: black;
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #f59e0b; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="text-yellow-400 text-2xl font-black mb-4 italic">SAHAYARAJ LOGIN</h2>
        <input type="text" id="user" placeholder="USERNAME">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="checkLogin()">LOGIN NOW ✅</button>
        <p id="status" class="mt-4 text-sm font-bold"></p>
    </div>

    <script>
        // இங்கே உங்கள் தற்போதைய Apps Script URL-ஐ மட்டும் போடுங்கள்
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1BtuTxZ30IGhyQ1epiFwZIdPGjT9HfmnKGQ4n1IVTDGa8R5Dp2olotKm9DqCm9rAo/exec";

        function checkLogin() {
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();
            const status = document.getElementById("status");

            if(!u || !p) { alert("விவரங்களை உள்ளிடவும்!"); return; }

            status.innerText = "சரிபார்க்கப்படுகிறது...";
            status.style.color = "yellow";

            // மிக எளிய Fetch முறை
            fetch(`${SCRIPT_URL}?username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
            .then(res => res.text())
            .then(data => {
                const result = data.trim();
                if(result === "success") {
                    sessionStorage.setItem("isAuth", "true");
                    window.location.href = "app.html";
                } else if(result === "expired") {
                    status.innerText = "❌ உங்கள் காலம் முடிந்துவிட்டது!";
                    status.style.color = "red";
                } else {
                    status.innerText = "❌ தவறான விவரங்கள்!";
                    status.style.color = "red";
                }
            })
            .catch(err => {
                status.innerText = "⚠️ சர்வர் பிழை!";
                status.style.color = "orange";
            });
        }
    </script>
</body>
</html>
