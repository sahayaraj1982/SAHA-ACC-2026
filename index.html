<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Login</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:#fff;
    padding:30px;
    border-radius:10px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>User Login</h2>
    <input type="text" id="userid" placeholder="User ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyidj6tKGntNIbnrljwlbkY6eLkezhaZ6x7B4jMZyMhh9rfuzhKLnbQegcJMQVVy0Gw/exec";

function login() {
    let userid = document.getElementById("userid").value;
    let password = document.getElementById("password").value;

    fetch(scriptURL)
    .then(res => res.json())
    .then(users => {
        let user = users.find(u =>
            u.userid === userid &&
            u.password === password
        );

        if(user){
            window.location.href = "app.html";
        } else {
            alert("Invalid Login");
        }
    });
}
</script>

</body>
</html>
