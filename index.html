<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SAHA ADMIN SYSTEM</title>
    <style>
        body {
            background: #f4f4f4;
            color: #000;
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            background: #fff;
            border: 2px solid #000;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: auto;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #333;
            background: #fff;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #eee;
        }

        .del-btn {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center;">SAHA MASTER ADMIN</h2>

        <label>User ID:</label>
        <input type="text" id="uName">

        <label>Password:</label>
        <input type="text" id="uPass">

        <label>Mobile:</label>
        <input type="text" id="uMob">

        <label>Expiry Date:</label>
        <input type="date" id="uExp">

        <label>Status:</label>
        <select id="uStatus">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
        </select>

        <button onclick="saveUser()" class="btn">SAVE / UPDATE ✅</button>
        <button onclick="loadUsers()" class="btn" style="background:#444;">REFRESH LIST 👥</button>
    </div>

    <div id="resArea" style="max-width:800px; margin:auto;"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6z1oE7bvQB4NJX1-ygLGK-9ujIezDAqBNFogoGljtc4I-DmBOwI_0mZrCRIvyaFuL/exec";

        function saveUser() {
            const u = document.getElementById("uName").value;
            const p = document.getElementById("uPass").value;
            const m = document.getElementById("uMob").value;
            const e = document.getElementById("uExp").value;
            const s = document.getElementById("uStatus").value;

            if (!u) {
                alert("ID கட்டாயம்!");
                return;
            }

            fetch(`${SCRIPT_URL}?action=saveUser&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&mobile=${encodeURIComponent(m)}&expiry=${encodeURIComponent(e)}&status=${encodeURIComponent(s)}`)
            .then(() => {
                alert("சேமிக்கப்பட்டது! ✅");
                loadUsers();
            })
            .catch(() => {
                alert("Save error!");
            });
        }

        function loadUsers() {
            document.getElementById("resArea").innerHTML = "Loading...";

            fetch(`${SCRIPT_URL}?action=getUsers`)
            .then(res => res.json())
            .then(data => {
                let h = `<table><tr><th>ID</th><th>Expiry</th><th>Action</th></tr>`;

                data.forEach(x => {
                    h += `
                    <tr>
                        <td>${x.name}</td>
                        <td>${x.expiry}</td>
                        <td>
                            <button class="del-btn" onclick="deleteUser('${x.name}')">Delete</button>
                        </td>
                    </tr>`;
                });

                h += `</table>`;
                document.getElementById("resArea").innerHTML = h;
            })
            .catch(() => {
                alert("சர்வர் பிழை! URL-ஐச் சரிபார்க்கவும்.");
            });
        }

        function deleteUser(name) {
            if (!confirm(name + " நீக்கவா?")) return;

            fetch(`${SCRIPT_URL}?action=deleteUser&username=${encodeURIComponent(name)}`)
            .then(() => loadUsers())
            .catch(() => alert("Delete error!"));
        }

        loadUsers();
    </script>
</body>
</html>
