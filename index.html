<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUpYObmYGUScSqoYfFmUlOevY3FGWTBEWT4zsqinOoC-R62HRz95sgK5WDc6qITjxr/exec";

function login(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    fetch(`${SCRIPT_URL}?action=getUsers`)
    .then(res => res.json())
    .then(data => {
        const found = data.find(u => u.name === user && u.pass === pass);

        if(found){
            window.location.href = "app.html";
        } else {
            document.getElementById("msg").innerText = "Login Failed!";
        }
    });
}
</script>
