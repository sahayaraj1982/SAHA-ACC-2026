<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHA LOGIN</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    width:350px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,215,0,0.3);
}
h2{
    text-align:center;
    color:#facc15;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}
#msg{
    margin-top:15px;
    text-align:center;
    color:red;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>SAHA LOGIN</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
    <div id="msg"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUpYObmYGUScSqoYfFmUlOevY3FGWTBEWT4zsqinOoC-R62HRz95sgK5WDc6qITjxr/exec";

function login(){
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    fetch(`${SCRIPT_URL}?action=getUsers`)
    .then(response => response.json())
    .then(data => {
        const validUser = data.find(x => x.name == user && x.pass == pass);

        if(validUser){
            window.location.href = "app.html";
        } else {
            document.getElementById("msg").innerText = "Invalid Login";
        }
    })
    .catch(error => {
        document.getElementById("msg").innerText = "Server Error";
    });
}
</script>

</body>
</html>
