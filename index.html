<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px 0; padding: 10px; width: 90%; }
    button { padding: 10px; cursor: pointer; margin: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .edit-btn { background: #4CAF50; color: white; }
    .del-btn { background: #f44336; color: white; }
  </style>
</head>
<body>
  <h3>வாடிக்கையாளர் மேலாண்மை (Admin UI)</h3>
  <input type="text" id="name" placeholder="பெயர்">
  <input type="text" id="mobile" placeholder="மொபைல் எண்">
  <input type="text" id="userID" placeholder="யூசர் ஐடி">
  <input type="password" id="password" placeholder="பாஸ்வேர்ட்">
  <br>
  <button onclick="saveData()">சேமி / மாற்று (Save/Update)</button>

  <table id="userTable">
    <thead>
      <tr>
        <th>பெயர்</th><th>மொபைல்</th><th>ஐடி</th><th>செயல்</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    function saveData() {
      var data = {
        name: document.getElementById('name').value,
        mobile: document.getElementById('mobile').value,
        userID: document.getElementById('userID').value,
        password: document.getElementById('password').value
      };
      google.script.run.withSuccessHandler(function(res) {
        alert(res);
        loadUsers();
        clearFields();
      }).saveUser(data);
    }

    function loadUsers() {
      google.script.run.withSuccessHandler(function(users) {
        var tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        for(var i=1; i<users.length; i++) {
          var row = `<tr>
            <td>${users[i][0]}</td><td>${users[i][1]}</td><td>${users[i][2]}</td>
            <td>
              <button class="edit-btn" onclick="editRow('${users[i][0]}','${users[i][1]}','${users[i][2]}','${users[i][3]}')">Edit</button>
              <button class="del-btn" onclick="deleteRow('${users[i][2]}')">Delete</button>
            </td>
          </tr>`;
          tbody.innerHTML += row;
        }
      }).getUsers();
    }

    function editRow(n, m, u, p) {
      document.getElementById('name').value = n;
      document.getElementById('mobile').value = m;
      document.getElementById('userID').value = u;
      document.getElementById('password').value = p;
    }

    function deleteRow(id) {
      if(confirm('நிச்சயமாக நீக்க வேண்டுமா?')) {
        google.script.run.withSuccessHandler(function(res) {
          alert(res);
          loadUsers();
        }).deleteUser(id);
      }
    }

    function clearFields() {
      document.getElementById('name').value = "";
      document.getElementById('mobile').value = "";
      document.getElementById('userID').value = "";
      document.getElementById('password').value = "";
    }

    window.onload = loadUsers;
  </script>
</body>
</html>
