<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026 (PROTECTED)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0c40bb; --n-col: #ffffff; --out: #54301d; --btm: #0b08d4; --c-let: #e32b2b; --c-num: #1e40af; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }
        * { font-weight: 950 !important; }
        .main-app-box { border: 10px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; overflow-x: hidden; transition: 0.3s; }
        .premium-header { background-color: var(--p-bg); padding: 25px; border-bottom: 10px solid var(--btm); position: relative; }
        .cat-card { background: #fff; border: 5px solid var(--out); border-radius: 20px; text-align: center; padding: 10px; position: relative; }
        .btn-style { border-bottom: 6px solid #000; color: #fff !important; cursor: pointer; transition: 0.1s; text-transform: uppercase; }
        .btn-style:active { transform: translateY(3px); border-bottom-width: 3px; }
        .cp-card { background: #fff; width: 98%; max-width: 1300px; border-radius: 40px; padding: 20px; border: 10px solid #000; max-height: 95vh; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 10px; border: 2px solid #000; border-radius: 10px; margin-bottom: 2px; font-size: 11px; }
    </style>
</head>
<body onload="init()">

<div id="lockScreen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center text-yellow-400 text-2xl font-bold">
    SECURITY CHECKING...
</div>

<div id="appPage" style="display:none;">
    <div id="mainContainer" class="main-app-box mx-auto">
        <div class="premium-header">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="backBtn" onclick="logout()" class="bg-red-600 w-12 h-12 rounded-full border-4 border-black text-white">🚪</button>
                    <div>
                        <h1 id="dispTitle" class="text-4xl italic uppercase" style="color: var(--n-col);">SAHAYARAJ-2026</h1>
                        <div id="liveDateTime" class="text-yellow-300 font-bold"></div>
                    </div>
                </div>
                <div class="text-right text-white">
                    <p id="loggedUserDisplay" class="text-xs text-yellow-400 uppercase"></p>
                    <h2 id="mainTotal" class="text-4xl">₹0</h2>
                </div>
            </div>
        </div>

        <div class="p-6">
            <p class="text-center p-10">உங்கள் ஸ்கிரிப்ட் வெற்றிகரமாக லாகின் செய்யப்பட்டு இயங்குகிறது!</p>
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
        </div>
    </div>
</div>

<script>
// --- பாதுகாப்பு மேலாண்மை ---
function init() {
    if (sessionStorage.getItem("isAuth") !== "true") {
        window.location.href = "index.html"; 
        return;
    }
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    document.getElementById('loggedUserDisplay').innerText = "USER: " + sessionStorage.getItem("userName");
    
    startClock();
    // இங்கே உங்கள் மற்ற பழைய init செயல்பாடுகளைச் சேர்க்கலாம்
}

function startClock() {
    setInterval(() => {
        const now = new Date();
        document.getElementById('liveDateTime').innerHTML = `${now.toLocaleDateString('en-GB')} | ${now.toLocaleTimeString('en-GB')}`;
    }, 1000);
}

function logout() {
    if(confirm("வெளியேற விரும்புகிறீர்களா?")) {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
}
</script>
</body>
</html>
