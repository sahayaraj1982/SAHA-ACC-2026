<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ - PROFESSIONAL ACCOUNTS MANAGER</title>
    
    <script>
        if (sessionStorage.getItem("isAuth") !== "true") {
            window.location.href = "index.html";
        }
    </script>

    <style>
        body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #161b22; border: 3px solid #d4af37; border-radius: 20px; padding: 30px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        h1 { text-align: center; color: #d4af37; font-size: 2.5em; text-transform: uppercase; border-bottom: 2px solid #d4af37; padding-bottom: 15px; margin-top: 0; }

        /* 3D Dashboard Cards */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: linear-gradient(145deg, #1c2128, #161b22); border: 2px solid #d4af37; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .card h3 { margin: 0; color: #8b949e; font-size: 1em; }
        .card p { margin: 10px 0 0; font-size: 2.2em; font-weight: bold; color: #d4af37; }

        /* Form Area */
        .entry-box { background: #0d1117; border: 1px solid #30363d; padding: 25px; border-radius: 15px; margin-bottom: 30px; border-left: 6px solid #d4af37; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #d4af37; }

        /* 3D Buttons */
        .btn-container { display: flex; gap: 15px; margin-top: 20px; }
        .btn-3d { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-bottom: 5px solid rgba(0,0,0,0.3); }
        .btn-add { background: linear-gradient(#d4af37, #b8860b); color: #000; }
        .btn-print { background: linear-gradient(#4a4a4a, #2b2b2b); color: #fff; }
        .btn-3d:active { transform: translateY(3px); border-bottom-width: 1px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0d1117; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #1f2937; color: #d4af37; text-transform: uppercase; }
        .credit { color: #39d353; font-weight: bold; }
        .debit { color: #f85149; font-weight: bold; }

        .logout { float: right; color: #f85149; text-decoration: none; font-weight: bold; border: 1px solid #f85149; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="#" onclick="logout()" class="logout">LOGOUT 🔓</a>
    <h1>SAHAYARAJ ACCOUNTS MANAGER</h1>

    <div class="dashboard">
        <div class="card">
            <h3>TOTAL CASH IN HAND</h3>
            <p id="grandTotal">₹ 0.00</p>
        </div>
        <div class="card">
            <h3>TOTAL INCOME</h3>
            <p id="totalIncome" style="color: #39d353;">₹ 0.00</p>
        </div>
        <div class="card">
            <h3>TOTAL EXPENSE</h3>
            <p id="totalExpense" style="color: #f85149;">₹ 0.00</p>
        </div>
    </div>

    <div class="entry-box">
        <h3>NEW ENTRY - புதிய பதிவு</h3>
        <div class="form-grid">
            <input type="text" id="desc" placeholder="விவரம் (e.g. Ticket Booking)">
            <input type="number" id="amount" placeholder="தொகை (Amount)">
            <select id="type">
                <option value="credit">CREDIT (வரவு)</option>
                <option value="debit">DEBIT (செலவு)</option>
            </select>
        </div>
        <div class="btn-container">
            <button class="btn-3d btn-add" onclick="addData()">ADD TO LIST</button>
            <button class="btn-3d btn-print" onclick="window.print()">PRINT REPORT</button>
        </div>
    </div>

    <table id="reportTable">
        <thead>
            <tr>
                <th>DATE</th>
                <th>DESCRIPTION</th>
                <th>TYPE</th>
                <th>AMOUNT</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let income = 0;
    let expense = 0;

    function addData() {
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const date = new Date().toLocaleDateString('en-GB');

        if(!desc || isNaN(amount)) return alert("விவரங்களைச் சரியாகப் பதிவிடவும்!");

        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow(0);

        if(type === 'credit') income += amount;
        else expense += amount;

        row.innerHTML = `
            <td>${date}</td>
            <td>${desc}</td>
            <td class="${type}">${type.toUpperCase()}</td>
            <td class="${type}">₹ ${amount.toFixed(2)}</td>
        `;

        updateDashboard();
        document.getElementById('desc').value = "";
        document.getElementById('amount').value = "";
    }

    function updateDashboard() {
        document.getElementById('totalIncome').innerText = `₹ ${income.toFixed(2)}`;
        document.getElementById('totalExpense').innerText = `₹ ${expense.toFixed(2)}`;
        document.getElementById('grandTotal').innerText = `₹ ${(income - expense).toFixed(2)}`;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>

</body>
</html>
