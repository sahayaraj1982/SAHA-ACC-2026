<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>SAHA ADMIN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fbbf24; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 2px solid #fbbf24; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, select { background: #fff; color: #000; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn { background: #fbbf24; color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; background: #111; }
        th, td { border: 1px solid #fbbf24; padding: 10px; text-align: left; }
        th { background: #fbbf24; color: #000; }
        .del-btn { background: #ef4444; color: white; padding: 5px 10px; border-radius: 4px; }
        .edit-btn { background: #3b82f6; color: white; padding: 5px 10px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <div class="card">
            <h2 class="text-2xl font-bold text-center mb-4 italic">ADMIN CONTROL CENTER</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="uName" placeholder="User Name">
                <input type="text" id="uPass" placeholder="Password">
                <input type="text" id="uMob" placeholder="Mobile Number">
                <input type="date" id="uExp">
                <select id="uStatus">
                    <option value="Active">Active (ON)</option>
                    <option value="Inactive">Inactive (OFF)</option>
                </select>
                <button onclick="saveUser()" class="btn">SAVE / UPDATE ✅</button>
            </div>
            <button onclick="loadUsers()" class="btn mt-4 bg-gray-700 text-white">REFRESH USER LIST 👥</button>
        </div>

        <div id="userList" class="overflow-x-auto"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1BtuTxZ30IGhyQ1epiFwZIdPGjT9HfmnKGQ4n1IVTDGa8R5Dp2olotKm9DqCm9rAo/exec";

        function saveUser() {
            const u = document.getElementById("uName").value;
            const p = document.getElementById("uPass").value;
            const m = document.getElementById("uMob").value;
            const e = document.getElementById("uExp").value;
            const s = document.getElementById("uStatus").value;
            if(!u) return alert("User Name முக்கியம்!");

            fetch(`${SCRIPT_URL}?action=saveUser&username=${u}&password=${p}&mobile=${m}&expiry=${e}&status=${s}`)
            .then(() => { alert("வெற்றி!"); loadUsers(); clearInputs(); });
        }

        function loadUsers() {
            document.getElementById("userList").innerHTML = "Loading...";
            fetch(`${SCRIPT_URL}?action=getUsers`)
            .then(res => res.json())
            .then(data => {
                let html = `<table><tr><th>User</th><th>Mobile</th><th>Expiry</th><th>Status</th><th>Actions</th></tr>`;
                data.forEach(u => {
                    html += `<tr>
                        <td>${u.name}</td>
                        <td>${u.mobile}</td>
                        <td>${u.expiry}</td>
                        <td>${u.status}</td>
                        <td>
                            <button onclick="editMode('${u.name}','${u.pass}','${u.mobile}','${u.expiry}','${u.status}')" class="edit-btn">Edit</button>
                            <button onclick="deleteUser('${u.name}')" class="del-btn">Delete</button>
                        </td>
                    </tr>`;
                });
                html += `</table>`;
                document.getElementById("userList").innerHTML = html;
            });
        }

        function editMode(n, p, m, e, s) {
            document.getElementById("uName").value = n;
            document.getElementById("uPass").value = p;
            document.getElementById("uMob").value = m;
            document.getElementById("uExp").value = e;
            document.getElementById("uStatus").value = s;
            window.scrollTo(0,0);
        }

        function deleteUser(u) {
            if(confirm(u + "-ஐ நீக்கலாமா?")) {
                fetch(`${SCRIPT_URL}?action=deleteUser&username=${u}`)
                .then(() => { alert("நீக்கப்பட்டது!"); loadUsers(); });
            }
        }

        function clearInputs() {
            document.getElementById("uName").value = "";
            document.getElementById("uPass").value = "";
            document.getElementById("uMob").value = "";
            document.getElementById("uExp").value = "";
        }

        loadUsers(); // பக்கம் திறக்கும்போதே லிஸ்டைக் காட்டும்
    </script>
</body>
</html>
