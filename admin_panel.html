<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAHA ADMIN PANEL</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}
.container{
    max-width:900px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
h2{
    text-align:center;
    color:#203a43;
}
label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}
button{
    padding:12px;
    margin-top:15px;
    width:100%;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}
.save-btn{
    background:#28a745;
    color:white;
}
.refresh-btn{
    background:#007bff;
    color:white;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th{
    background:#203a43;
    color:white;
}
.del-btn{
    background:#dc3545;
    color:white;
    padding:6px 10px;
    border:none;
    border-radius:6px;
}
</style>
</head>
<body>

<div class="container">
    <h2>SAHA MASTER CONTROL</h2>

    <label>User Login ID</label>
    <input type="text" id="uName">

    <label>Password</label>
    <input type="text" id="uPass">

    <label>Mobile</label>
    <input type="text" id="uMob">

    <label>Expiry Date</label>
    <input type="date" id="uExp">

    <label>Status</label>
    <select id="uStatus">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
    </select>

    <button class="save-btn" onclick="saveUser()">SAVE / UPDATE</button>
    <button class="refresh-btn" onclick="loadUsers()">REFRESH USERS</button>

    <div id="result"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/library/d/196F9lc1nBO8QcFVPdP4cvD4O7i0U4T6QTogD5T7SLevO7EaHo1iAeomh/29";

function saveUser() {
    const u = document.getElementById("uName").value;
    const p = document.getElementById("uPass").value;
    const m = document.getElementById("uMob").value;
    const e = document.getElementById("uExp").value;
    const s = document.getElementById("uStatus").value;

    fetch(`${SCRIPT_URL}?action=saveUser&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&mobile=${encodeURIComponent(m)}&expiry=${encodeURIComponent(e)}&status=${encodeURIComponent(s)}`)
    .then(res => res.text())
    .then(msg => {
        alert("Saved Successfully");
        loadUsers();
    })
    .catch(err => {
        alert("Server Error: " + err);
    });
}

function loadUsers() {
    fetch(`${SCRIPT_URL}?action=getUsers`)
    .then(res => res.json())
    .then(data => {
        let html = `
        <table>
        <tr>
            <th>User</th>
            <th>Status</th>
            <th>Expiry</th>
            <th>Action</th>
        </tr>`;

        data.forEach(user => {
            html += `
            <tr>
                <td>${user.name}</td>
                <td>${user.status}</td>
                <td>${user.expiry}</td>
                <td>
                    <button class="del-btn" onclick="deleteUser('${user.name}')">Delete</button>
                </td>
            </tr>`;
        });

        html += "</table>";
        document.getElementById("result").innerHTML = html;
    })
    .catch(err => {
        alert("Load Error: " + err);
    });
}

function deleteUser(name) {
    fetch(`${SCRIPT_URL}?action=deleteUser&username=${encodeURIComponent(name)}`)
    .then(res => res.text())
    .then(msg => loadUsers());
}

loadUsers();
</script>

</body>
</html>
