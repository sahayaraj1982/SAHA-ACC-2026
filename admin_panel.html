<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>MASTER ADMIN PRO - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fbbf24; font-family: sans-serif; }
        .gold-border { border: 2px solid #fbbf24; background: #111; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { background: #fff; color: #000; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn { background: #fbbf24; color: #000; font-weight: bold; padding: 10px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; color: #fff; margin-top: 10px; }
        th, td { border: 1px solid #fbbf24; padding: 10px; text-align: left; }
        th { background: #fbbf24; color: #000; }
        .action-btns { display: flex; gap: 5px; }
        .edit-btn { background: #3b82f6; color: white; padding: 5px 10px; border-radius: 4px; }
        .del-btn { background: #ef4444; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <div class="gold-border">
            <h2 class="text-xl font-bold text-center mb-4">USER MANAGER</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="uName" placeholder="User Name">
                <input type="text" id="uPass" placeholder="Password">
                <input type="text" id="uMob" placeholder="Mobile Number">
                <input type="date" id="uExp">
                <select id="uStatus">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
                <button onclick="saveUser()" class="btn">SAVE / UPDATE ✅</button>
            </div>
            <button onclick="loadUsers()" class="btn w-full mt-4 bg-gray-700 text-white">REFRESH LIST 👥</button>
        </div>

        <div id="userTableArea" class="overflow-x-auto"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzG0qwUct5gk4tZdCGPJUeXcJQQit7CgTsNH4ZDS1fkCnUX8NeKjDkxvgxdaNyXnmSn/exec";

        function saveUser() {
            const u = document.getElementById("uName").value;
            const p = document.getElementById("uPass").value;
            const m = document.getElementById("uMob").value;
            const e = document.getElementById("uExp").value;
            const s = document.getElementById("uStatus").value;
            if(!u) return alert("பெயர் கட்டாயம்!");

            fetch(`${SCRIPT_URL}?action=saveUser&username=${u}&password=${p}&mobile=${m}&expiry=${e}&status=${s}`)
            .then(() => { alert("அப்டேட் செய்யப்பட்டது!"); loadUsers(); clearInputs(); });
        }

        function loadUsers() {
            fetch(`${SCRIPT_URL}?action=getUsers`)
            .then(res => res.json())
            .then(data => {
                let html = `<table><tr><th>User</th><th>Mobile</th><th>Expiry</th><th>Status</th><th>Actions</th></tr>`;
                data.forEach(u => {
                    html += `<tr>
                        <td>${u.name}</td>
                        <td>${u.mobile}</td>
                        <td>${u.expiry}</td>
                        <td>${u.status}</td>
                        <td class="action-btns">
                            <button onclick="editMode('${u.name}','${u.pass}','${u.mobile}','${u.expiry}','${u.status}')" class="edit-btn">Edit</button>
                            <button onclick="deleteUser('${u.name}')" class="del-btn">Del</button>
                        </td>
                    </tr>`;
                });
                html += `</table>`;
                document.getElementById("userTableArea").innerHTML = html;
            });
        }

        function editMode(name, pass, mobile, expiry, status) {
            document.getElementById("uName").value = name;
            document.getElementById("uPass").value = pass;
            document.getElementById("uMob").value = mobile;
            document.getElementById("uExp").value = expiry;
            document.getElementById("uStatus").value = status;
            window.scrollTo(0,0);
        }

        function deleteUser(name) {
            if(confirm(name + "-ஐ நீக்கலாமா?")) {
                fetch(`${SCRIPT_URL}?action=deleteUser&username=${name}`)
                .then(() => { alert("நீக்கப்பட்டது!"); loadUsers(); });
            }
        }

        function clearInputs() {
            document.getElementById("uName").value = "";
            document.getElementById("uPass").value = "";
            document.getElementById("uMob").value = "";
            document.getElementById("uExp").value = "";
        }

        loadUsers();
    </script>
</body>
</html>
