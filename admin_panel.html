<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>SAHA ADMIN PANEL</title>
    <style>
        /* எழுத்து கருப்பாகத் தெரிய தெளிவான ஸ்டைல் */
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; padding: 20px; }
        .box { border: 3px solid #000; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 2px solid #000; border-radius: 5px; 
            background: #fff !important; color: #000 !important; 
            font-size: 16px; font-weight: bold;
        }
        .btn { background: #000; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; color: #000; }
        th { background: #eee; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align: center;">ADMIN CONTROL</h2>
    <label>User ID:</label>
    <input type="text" id="uName" placeholder="பெயரை அடிக்கவும்">
    
    <label>Password:</label>
    <input type="text" id="uPass" placeholder="பாஸ்வேர்டு அடிக்கவும்">
    
    <label>Mobile:</label>
    <input type="text" id="uMob" placeholder="மொபைல் எண்">
    
    <label>Expiry Date:</label>
    <input type="date" id="uExp">
    
    <label>Status:</label>
    <select id="uStatus">
        <option value="Active">Active (ஆன்)</option>
        <option value="Inactive">Inactive (ஆஃப்)</option>
    </select>
    
    <button onclick="saveUser()" class="btn">SAVE / UPDATE ✅</button>
    <button onclick="loadUsers()" class="btn" style="background: #444;">SHOW LIST 👥</button>
</div>

<div id="listArea" style="margin-top: 20px;"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRbs-oLsO9Kevp4NOo5gGxTjFzDD5BW_WBS1i5Uikd3qX0AuXcccRPxUtFB2KIA6MQ/exec";

    function saveUser() {
        const u = document.getElementById("uName").value;
        const p = document.getElementById("uPass").value;
        const m = document.getElementById("uMob").value;
        const e = document.getElementById("uExp").value;
        const s = document.getElementById("uStatus").value;
        if(!u) return alert("ID கட்டாயம்!");

        fetch(`${SCRIPT_URL}?action=saveUser&username=${u}&password=${p}&mobile=${m}&expiry=${e}&status=${s}`)
        .then(() => { alert("சேமிக்கப்பட்டது!"); loadUsers(); });
    }

    function loadUsers() {
        document.getElementById("listArea").innerHTML = "Loading...";
        fetch(`${SCRIPT_URL}?action=getUsers`)
        .then(res => res.json())
        .then(data => {
            let html = `<table><tr><th>ID</th><th>Exp</th><th>Status</th><th>Action</th></tr>`;
            data.forEach(u => {
                html += `<tr><td>${u.name}</td><td>${u.expiry}</td><td>${u.status}</td><td><button onclick="deleteUser('${u.name}')">Del</button></td></tr>`;
            });
            html += `</table>`;
            document.getElementById("listArea").innerHTML = html;
        }).catch(() => { alert("சர்வர் பிழை! URL செக் செய்யவும்."); });
    }

    function deleteUser(n) {
        if(confirm(n + "-ஐ நீக்கவா?")) {
            fetch(`${SCRIPT_URL}?action=deleteUser&username=${n}`).then(() => loadUsers());
        }
    }
</script>
</body>
</html>
