<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{
    font-family: Arial,sans-serif;
    background:#f2f2f2;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}
input{
    width:23%;
    padding:10px;
    margin:5px;
}
button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
table, th, td{
    border:1px solid #ccc;
}
th, td{
    padding:10px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <h2>User Management</h2>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="userid" placeholder="User ID">
    <input type="text" id="password" placeholder="Password">
    <button onclick="addUser()">Add User</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>User ID</th>
                <th>Password</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyidj6tKGntNIbnrljwlbkY6eLkezhaZ6x7B4jMZyMhh9rfuzhKLnbQegcJMQVVy0Gw/exec";

function addUser() {
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let userid = document.getElementById("userid").value;
    let password = document.getElementById("password").value;

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            action: "add",
            name: name,
            mobile: mobile,
            userid: userid,
            password: password
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadUsers();
    });
}

function loadUsers() {
    fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
        let rows = "";
        data.forEach(user => {
            rows += `
            <tr>
                <td>${user.name}</td>
                <td>${user.mobile}</td>
                <td>${user.userid}</td>
                <td>${user.password}</td>
            </tr>`;
        });
        document.getElementById("userTable").innerHTML = rows;
    });
}

loadUsers();
</script>

</body>
</html>
