<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>SAHA ADMIN PANEL</title>
    <style>
        body { background-color: #f0f0f0; font-family: sans-serif; padding: 20px; }
        .container { background: #fff; border: 3px solid #fbbf24; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #555; }
        /* எழுத்து கருப்பாகத் தெரிய முக்கியமான பகுதி */
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; 
            border: 2px solid #ccc; border-radius: 5px; 
            box-sizing: border-box; font-size: 16px;
            background-color: #ffffff !important; 
            color: #000000 !important; 
        }
        .btn { background: #fbbf24; color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .refresh-btn { background: #2563eb; color: #fff; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; color: #000; }
        th { background: #fbbf24; }
        .del-btn { background: #ef4444; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>ADMIN CONTROL</h2>
    <label>User ID:</label>
    <input type="text" id="uName" placeholder="ID அடிக்கவும்">
    
    <label>Password:</label>
    <input type="text" id="uPass" placeholder="Password அடிக்கவும்">
    
    <label>Mobile:</label>
    <input type="text" id="uMob" placeholder="Mobile No">
    
    <label>Expiry Date:</label>
    <input type="date" id="uExp">
    
    <label>Status:</label>
    <select id="uStatus">
        <option value="Active">Active (ON)</option>
        <option value="Inactive">Inactive (OFF)</option>
    </select>
    
    <button onclick="saveUser()" class="btn">SAVE / UPDATE ✅</button>
    <button onclick="loadUsers()" class="btn refresh-btn">SHOW USER LIST 👥</button>
</div>

<div id="displayArea" style="max-width: 800px; margin: 20px auto;"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRbs-oLsO9Kevp4NOo5gGxTjFzDD5BW_WBS1i5Uikd3qX0AuXcccRPxUtFB2KIA6MQ/exec";

    function saveUser() {
        const u = document.getElementById("uName").value;
        const p = document.getElementById("uPass").value;
        const m = document.getElementById("uMob").value;
        const e = document.getElementById("uExp").value;
        const s = document.getElementById("uStatus").value;
        if(!u) return alert("ID கட்டாயம்!");

        fetch(`${SCRIPT_URL}?action=saveUser&username=${u}&password=${p}&mobile=${m}&expiry=${e}&status=${s}`)
        .then(() => { alert("வெற்றி!"); loadUsers(); });
    }

    function loadUsers() {
        document.getElementById("displayArea").innerHTML = "Loading...";
        fetch(`${SCRIPT_URL}?action=getUsers`)
        .then(res => res.json())
        .then(data => {
            let html = `<table><tr><th>User</th><th>Mobile</th><th>Expiry</th><th>Status</th><th>Action</th></tr>`;
            data.forEach(u => {
                html += `<tr>
                    <td>${u.name}</td>
                    <td>${u.mobile}</td>
                    <td>${u.expiry}</td>
                    <td>${u.status}</td>
                    <td><button class="del-btn" onclick="deleteUser('${u.name}')">Del</button></td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById("displayArea").innerHTML = html;
        }).catch(() => { document.getElementById("displayArea").innerHTML = "சர்வர் பிழை! URL செக் செய்யவும்."; });
    }

    function deleteUser(name) {
        if(confirm(name + "-ஐ நீக்கவா?")) {
            fetch(`${SCRIPT_URL}?action=deleteUser&username=${name}`).then(() => loadUsers());
        }
    }
</script>
</body>
</html>
