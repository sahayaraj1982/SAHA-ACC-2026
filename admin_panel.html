<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.form-box{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    margin-bottom:20px;
}
.form-box input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}
.form-box button{
    padding:10px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
.form-box button:hover{
    background:#0056b3;
}
table{
    width:100%;
    border-collapse:collapse;
}
table th, table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
table th{
    background:#007bff;
    color:white;
}
.action-btn{
    padding:6px 10px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
}
.edit{
    background:orange;
}
.delete{
    background:red;
}
</style>
</head>
<body>

<div class="container">
    <h2>User Management Panel</h2>

    <div class="form-box">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="text" id="userid" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="addUser()">Add User</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>User ID</th>
                <th>Password</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyidj6tKGntNIbnrljwlbkY6eLkezhaZ6x7B4jMZyMhh9rfuzhKLnbQegcJMQVVy0Gw/exec";

let users = [];
let editIndex = -1;

function addUser(){
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let userid = document.getElementById("userid").value;
    let password = document.getElementById("password").value;

    if(!name || !mobile || !userid || !password){
        alert("Fill all fields");
        return;
    }

    let action = editIndex === -1 ? "add" : "edit";

    fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify({
            action: action,
            name: name,
            mobile: mobile,
            userid: userid,
            password: password
        })
    })
    .then(res=>res.text())
    .then(msg=>{
        alert(msg);

        if(editIndex === -1){
            users.push({name,mobile,userid,password});
        }else{
            users[editIndex] = {name,mobile,userid,password};
            editIndex = -1;
        }

        displayUsers();
        clearForm();
    });
}

function displayUsers(){
    let table = document.getElementById("userTable");
    table.innerHTML = "";

    users.forEach((user,index)=>{
        table.innerHTML += `
        <tr>
            <td>${user.name}</td>
            <td>${user.mobile}</td>
            <td>${user.userid}</td>
            <td>${user.password}</td>
            <td>
                <button class="action-btn edit" onclick="editUser(${index})">Edit</button>
                <button class="action-btn delete" onclick="deleteUser('${user.userid}', ${index})">Delete</button>
            </td>
        </tr>`;
    });
}

function editUser(index){
    let user = users[index];

    document.getElementById("name").value = user.name;
    document.getElementById("mobile").value = user.mobile;
    document.getElementById("userid").value = user.userid;
    document.getElementById("password").value = user.password;

    editIndex = index;
}

function deleteUser(userid,index){
    fetch(scriptURL,{
        method:"POST",
        body:JSON.stringify({
            action:"delete",
            userid: userid
        })
    })
    .then(res=>res.text())
    .then(msg=>{
        alert(msg);
        users.splice(index,1);
        displayUsers();
    });
}

function clearForm(){
    document.getElementById("name").value = "";
    document.getElementById("mobile").value = "";
    document.getElementById("userid").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>
</html>
