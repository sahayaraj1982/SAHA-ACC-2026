<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* எழுத்து கருப்பாக தெரிய வெள்ளை பின்னணி */
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; padding: 20px; }
        .box { border: 2px solid #000; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, select { 
            width: 100%; padding: 12px; margin-top: 10px; 
            border: 1px solid #000; border-radius: 5px; 
            background: #fff !important; color: #000 !important; /* கறுப்பு எழுத்து */
            font-size: 16px; font-weight: bold;
        }
        button { background: #000; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center;">SAHA ADMIN PANEL</h2>
        <input type="text" id="uName" placeholder="User ID">
        <input type="text" id="uPass" placeholder="Password">
        <input type="text" id="uMob" placeholder="Mobile">
        <input type="date" id="uExp">
        <select id="uStatus">
            <option value="Active">Active (ON)</option>
            <option value="Inactive">Inactive (OFF)</option>
        </select>
        <button onclick="saveUser()">SAVE ✅</button>
        <button onclick="loadUsers()" style="background: #555;">SHOW LIST 👥</button>
    </div>
    <div id="res" style="margin-top: 20px;"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz65zJYZZlHYlgp-9ojlB5s54Pluj111LT-pKfSbx4FpvBuIC6fahTzYW_WdbeQ3M9L/exec";
        function saveUser() {
            const u = document.getElementById("uName").value;
            const p = document.getElementById("uPass").value;
            const m = document.getElementById("uMob").value;
            const e = document.getElementById("uExp").value;
            const s = document.getElementById("uStatus").value;
            fetch(`${SCRIPT_URL}?action=saveUser&username=${u}&password=${p}&mobile=${m}&expiry=${e}&status=${s}`)
            .then(() => { alert("Saved!"); loadUsers(); });
        }
        function loadUsers() {
            fetch(`${SCRIPT_URL}?action=getUsers`).then(res => res.json()).then(data => {
                let h = `<table border="1" style="width:100%; border-collapse: collapse; margin-top:10px;"><tr><th>ID</th><th>EXP</th></tr>`;
                data.forEach(x => { h += `<tr><td>${x.name}</td><td>${x.expiry}</td></tr>`; });
                document.getElementById("res").innerHTML = h + `</table>`;
            }).catch(() => alert("Server Error! Check URL"));
        }
    </script>
</body>
</html>
