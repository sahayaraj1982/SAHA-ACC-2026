<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
body{
 margin:0;
 font-family:Arial;
 background:#111827;
 color:white;
 padding:20px;
}
.box{
 max-width:500px;
 margin:auto;
 background:#1f2937;
 padding:20px;
 border-radius:15px;
 box-shadow:0 0 15px gold;
}
input{
 width:100%;
 padding:10px;
 margin:10px 0;
 border:none;
 border-radius:8px;
 box-sizing:border-box;
}
button{
 width:100%;
 padding:10px;
 background:#22c55e;
 color:white;
 border:none;
 border-radius:8px;
 margin-top:10px;
}
.user{
 background:#374151;
 padding:10px;
 margin-top:10px;
 border-radius:8px;
}
.del{
 background:red;
 margin-top:5px;
}
</style>
</head>
<body>
<div class="box">
<h2>ADMIN PANEL</h2>

<input type="text" id="newuser" placeholder="New Username">
<input type="text" id="newpass" placeholder="New Password">
<button onclick="addUser()">ADD USER</button>

<div id="users"></div>
</div>

<script>
const BASE_URL = "YOUR_FIREBASE_URL/users";

function loadUsers(){
 fetch(BASE_URL+".json")
 .then(res=>res.json())
 .then(data=>{
   let html="";
   for(let key in data){
     html+=`
       <div class="user">
         ${data[key].username}
         <button class="del" onclick="deleteUser('${key}')">DELETE</button>
       </div>
     `;
   }
   document.getElementById("users").innerHTML=html;
 });
}

function addUser(){
 let username=document.getElementById("newuser").value;
 let password=document.getElementById("newpass").value;

 fetch(BASE_URL+".json",{
   method:"POST",
   body:JSON.stringify({username,password})
 }).then(()=>loadUsers());
}

function deleteUser(key){
 fetch(BASE_URL+"/"+key+".json",{
   method:"DELETE"
 }).then(()=>loadUsers());
}

loadUsers();
</script>
</body>
</html>
